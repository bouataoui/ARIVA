services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ariva
      POSTGRES_PASSWORD: ariva_secret
      POSTGRES_DB: ariva
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ariva -d ariva"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── NestJS Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./ariva-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://ariva:ariva_secret@db:5432/ariva?schema=public
      JWT_SECRET: un_secret_long_et_aleatoire
      JWT_EXPIRES_IN: 7d
      # Email SMTP
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: bouataoui09@gmail.com
      SMTP_PASS: "sosx vjdt wkht dtie"
      FRONTEND_URL: http://localhost:3000
      # Polling pour hot-reload sur Windows / WSL2
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5000:5000"
    volumes:
      # Hot reload : on monte le code source uniquement
      - ./ariva-backend/src:/app/src
      - ./ariva-backend/prisma:/app/prisma
      # node_modules isolés dans un volume Docker (ne pas écraser celui de l'image)
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./ariva-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      # Polling nécessaire pour hot-reload dans Docker sur Windows
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      # Hot reload : code source monté, node_modules isolés
      - ./ariva-frontend/app:/app/app
      - ./ariva-frontend/components:/app/components
      - ./ariva-frontend/contexts:/app/contexts
      - ./ariva-frontend/lib:/app/lib
      - ./ariva-frontend/hooks:/app/hooks
      - ./ariva-frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

# ── Volumes nommés ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
